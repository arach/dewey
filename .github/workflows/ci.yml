name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run test
      - name: Verify generated artifacts are current
        run: |
          bun packages/docs/src/cli/index.ts generate
          git diff --exit-code -- AGENTS.md llms.txt docs.json install.md agent
      - run: bun run build
