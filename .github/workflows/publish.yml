name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no actual publish)'
        required: false
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Node for npm publishing
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Verify packed package
        run: bun run verify:package

      - name: Get version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        id: tag_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: bun run --cwd packages/docs verify:release ${{ steps.tag_version.outputs.VERSION }}

      - name: Publish @arach/dewey (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: packages/docs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Publish @arach/dewey (manual)
        if: github.event_name == 'workflow_dispatch'
        working-directory: packages/docs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "DRY RUN: Would publish @arach/dewey"
            npm publish --dry-run --access public
          else
            npm publish --access public
          fi
